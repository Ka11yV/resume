<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ka11y | Git Resume</title>
    <meta
      name="description"
      content="Ka11y의 GitHub 활동과 프로젝트를 기반으로 구성한 온라인 이력서입니다."
    />
    <meta name="theme-color" content="#eef2f6" />
    <link
      rel="stylesheet"
      href="./styles.css"
    />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#hero">Ka11y Resume</a>
      <nav class="topnav" id="topnav"></nav>
    </header>

    <main id="home" class="page">
      <section class="apple-section hero-section theme-dark" id="hero">
        <div class="section-shell hero">
          <div class="hero-copy">
            <p class="eyebrow" id="eyebrow"></p>
            <h1 id="name"></h1>
            <p class="headline" id="headline"></p>
            <p class="summary" id="summary"></p>
            <div class="cta-row" id="cta-row"></div>
            <ul class="chips" id="focus-chips"></ul>
          </div>
          <aside class="hero-panel">
            <img id="avatar" class="avatar" alt="프로필 사진" />
            <div class="meta-card">
              <p class="meta-label">Quick Facts</p>
              <ul class="meta-list" id="meta-list"></ul>
            </div>
          </aside>
        </div>
      </section>

      <section class="apple-section stats-section theme-light" id="stats">
        <div class="section-shell">
          <div class="section-heading">
            <p class="section-kicker">Summary</p>
            <h2>핵심 요약</h2>
          </div>
          <div class="stats-grid" id="stats-grid"></div>
        </div>
      </section>

      <section class="apple-section strengths-section theme-dark" id="strengths">
        <div class="section-shell">
          <div class="section-heading">
            <p class="section-kicker">Strengths</p>
            <h2>강점</h2>
          </div>
          <div class="strength-grid" id="strength-grid"></div>
        </div>
      </section>

      <section class="apple-section stack-section theme-light" id="stack">
        <div class="section-shell">
          <div class="section-heading">
            <p class="section-kicker">Stack</p>
            <h2>기술 스택</h2>
          </div>
          <div class="stack-grid" id="stack-grid"></div>
        </div>
      </section>

      <section class="apple-section projects-section theme-dark" id="projects">
        <div class="section-shell">
          <div class="section-heading">
            <p class="section-kicker">Projects</p>
            <h2>대표 프로젝트</h2>
          </div>
          <div class="project-grid" id="project-grid"></div>
        </div>
      </section>

      <section class="apple-section timeline-section theme-light" id="timeline">
        <div class="section-shell">
          <div class="section-heading">
            <p class="section-kicker">Activity</p>
            <h2>활동과 흐름</h2>
          </div>
          <div class="timeline" id="timeline-list"></div>
        </div>
      </section>

      <section class="apple-section writing-section theme-dark" id="writing">
        <div class="section-shell">
          <div class="section-heading">
            <p class="section-kicker">Learning</p>
            <h2>학습과 기록</h2>
          </div>
          <div class="writing-card" id="writing-card"></div>
        </div>
      </section>

      <section class="apple-section contact-section theme-light" id="contact">
        <div class="section-shell">
          <div class="section-heading">
            <p class="section-kicker">Contact</p>
            <h2>연락처</h2>
          </div>
          <div class="contact-box" id="contact-box"></div>
        </div>
      </section>
    </main>

    <footer class="footer theme-dark">
      <p id="footer-note"></p>
    </footer>

    <script src="./resume-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
